<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AthletixI - Join the Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #fafafa;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .gradient-text {
            background: linear-gradient(to right, #10b981, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }
        .input-field:focus {
            border-color: #10b981;
            background: rgba(255, 255, 255, 0.08);
            outline: none;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.1);
        }
        .btn-primary {
            background: #10b981;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background: #059669;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .loader {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-emerald-500/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-cyan-500/10 blur-[120px] rounded-full"></div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 mb-4">
                <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="m13 2-2 10h9L11 22l2-10H4Z"/></svg>
                </div>
                <span class="text-2xl font-bold tracking-tighter">ATHLETIX<span class="text-emerald-500">I</span></span>
            </div>
            <h1 class="text-3xl font-bold mb-2">Join the Elite</h1>
            <p class="text-zinc-400">Start your journey to professional sports excellence.</p>
        </div>

        <div class="glass-card p-8 rounded-3xl shadow-2xl">
            <form id="signupForm" class="space-y-5">
                <div class="space-y-2">
                    <label for="fullName" class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">Full Name</label>
                    <input type="text" id="fullName" required placeholder="Enter your full name" 
                        class="w-full px-4 py-3 rounded-xl input-field text-sm">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label for="age" class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">Age</label>
                        <input type="number" id="age" required min="1" max="120" placeholder="Years" 
                            class="w-full px-4 py-3 rounded-xl input-field text-sm">
                    </div>
                    <div class="space-y-2">
                        <label for="city" class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">City</label>
                        <input type="text" id="city" required placeholder="Your city" 
                            class="w-full px-4 py-3 rounded-xl input-field text-sm">
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="phone" class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">Phone Number</label>
                    <input type="tel" id="phone" required placeholder="+1 (555) 000-0000" 
                        class="w-full px-4 py-3 rounded-xl input-field text-sm">
                </div>

                <div class="space-y-2">
                    <label for="email" class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com" 
                        class="w-full px-4 py-3 rounded-xl input-field text-sm">
                </div>

                <div class="space-y-2">
                    <label for="password" class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">Password</label>
                    <input type="password" id="password" required minlength="6" placeholder="••••••••" 
                        class="w-full px-4 py-3 rounded-xl input-field text-sm">
                </div>

                <button type="submit" id="submitBtn" class="w-full py-4 rounded-xl btn-primary font-bold text-sm flex items-center justify-center gap-2">
                    Create Account
                </button>
            </form>

            <div id="message" class="mt-6 p-4 rounded-xl text-sm hidden"></div>

            <div class="mt-8 text-center">
                <p class="text-zinc-500 text-xs">
                    Already have an account? <a href="/" class="text-emerald-500 hover:underline">Sign In</a>
                </p>
            </div>
        </div>
        
        <p class="mt-8 text-center text-zinc-600 text-[10px] uppercase tracking-widest">
            © 2026 AthletixI. Securely powered by Supabase.
        </p>
    </div>

    <script type="module" src="signup.js"></script>
</body>
</html>
